version: '3.8'

services:
  # SERVICIO 1: Tu Microservicio de Productos
  producto-service:
    build:
      context: ./producto-service
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: producto-service-container
    ports:
      - "8081:8081"
    volumes:
      # Mapea la carpeta 'db' de tu PC a la ruta que configuramos en .properties
      - ./db:/deployments/db
    networks:
      - moto-network
    restart: always

  # SERVICIO 2: API Gateway (NGINX)
  api-gateway:
    image: nginx:latest
    container_name: api-gateway-container
    ports:
      - "8080:8080" # Este es el puerto que el usuario debe usar
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - producto-service
    networks:
      - moto-network
    restart: always

networks:
  moto-network:
    driver: bridgeññ