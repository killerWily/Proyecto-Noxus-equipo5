# *****************************************************************************************************************************************
# PROYECTO NEXUS - CONFIGURACIÓN DEL MICROSERVICIO DE INVENTARIO
# *****************************************************************************************************************************************

# =========================================================================================================================================
# --- CONFIGURACIÓN DE PERSISTENCIA (Base de Datos H2) ---
# =========================================================================================================================================

# Define el motor de base de datos a utilizar (H2 en memoria/archivo)
quarkus.datasource.db-kind=h2

# Ruta de conexión física: Almacena los datos en la carpeta /db en la raíz del proyecto.
# AUTO_SERVER=TRUE permite que múltiples procesos accedan al archivo simultáneamente.
quarkus.datasource.jdbc.url=jdbc:h2:file:../db/inventario_db;AUTO_SERVER=TRUE

# Credenciales de acceso por defecto para el entorno de desarrollo
quarkus.datasource.username=sa
quarkus.datasource.password=

# =========================================================================================================================================
# --- CONFIGURACIÓN DE HIBERNATE ORM --- 
# =========================================================================================================================================

# Generación automática del esquema: Crea o actualiza tablas según los modelos Java.
quarkus.hibernate-orm.database.generation=update

# Script de inicialización: Carga datos desde import.sql al iniciar.
quarkus.hibernate-orm.sql.load-script-source=import.sql

# =========================================================================================================================================
# --- INTERFAZ DE DOCUMENTACIÓN (Swagger UI / OpenAPI) --- 
# =========================================================================================================================================

# Asegura que la documentación esté disponible siempre en modo desarrollo y producción.
quarkus.swagger-ui.always-include=true

# Ruta de acceso personalizada para la consola de pruebas API.
quarkus.swagger-ui.path=/q/swagger-ui

# Identidad visual de la interfaz Swagger.
quarkus.swagger-ui.title=NEXUS - Sistema de Gestión de Inventario Universal

# Optimización visual: Renderiza modelos compactos y mantiene las listas cerradas por defecto.
quarkus.swagger-ui.default-model-rendering=model
quarkus.swagger-ui.doc-expansion=list

# =========================================================================================================================================
# --- CONFIGURACIÓN DE RED (Network) ---
# =========================================================================================================================================

# Puerto de escucha del microservicio (Configurado para operar detrás del API Gateway).
quarkus.http.port=8081